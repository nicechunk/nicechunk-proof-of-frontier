<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Candidate validation flow</title>
  <desc id="desc">A diagram showing the validation path for a frontier candidate, from neighbor keys through proof hash, difficulty check, chunk key, and frontier root update.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070d14"/><stop offset="1" stop-color="#13170d"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#8fdcff"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.line{stroke:#8fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}.bad{stroke:#ff7d7d;stroke-width:2;fill:none}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1040" cy="610" r="280" fill="#83ff00" opacity=".07"/><circle cx="220" cy="120" r="250" fill="#00c2ff" opacity=".07"/>
  <text x="70" y="78" class="label">FRONTIER VALIDATION</text>
  <text x="70" y="132" class="title">A candidate must prove local adjacency first.</text>
  <text x="70" y="168" class="copy">The proof path is deterministic: neighbor context, proof hash, difficulty prefix, chunk key, then frontier root recomputation.</text>
  <g transform="translate(70 252)"><rect class="card" width="204" height="172"/><text x="24" y="42" class="head">Candidate</text><text x="24" y="78" class="mono">x, y</text><text x="24" y="108" class="small">not unlocked</text><text x="24" y="136" class="small">one neighbor required</text></g>
  <path class="line" d="M274 338 H334"/>
  <g transform="translate(356 226)"><rect class="card" width="238" height="224"/><text x="24" y="42" class="head">Neighbor context</text><text x="24" y="78" class="small">north, east</text><text x="24" y="108" class="small">south, west</text><text x="24" y="146" class="mono">sha256(keys)</text><text x="24" y="182" class="small">EMPTY is explicit</text></g>
  <path class="line" d="M594 338 H654"/>
  <g transform="translate(676 226)"><rect class="card" width="238" height="224"/><text x="24" y="42" class="head">Proof hash</text><text x="24" y="78" class="mono">NCK_CHUNK_POW_V1</text><text x="24" y="112" class="small">seed, coord, miner</text><text x="24" y="142" class="small">neighbor context</text><text x="24" y="176" class="small">nonce search</text></g>
  <path class="line" d="M914 338 H974"/>
  <g transform="translate(996 252)"><rect class="card" width="214" height="172"/><text x="24" y="42" class="head">Accept</text><text x="24" y="78" class="small">prefix matches target</text><text x="24" y="108" class="mono">chunkKey</text><text x="24" y="136" class="small">unlock chunk</text></g>
  <g transform="translate(220 536)"><rect class="card" width="840" height="90"/><text x="28" y="38" class="head">After acceptance</text><text x="28" y="66" class="small">Candidate expansion recomputes perimeter edges, frontier root, contour seed candidates, and difficulty status from the updated graph.</text></g>
  <path class="bad" d="M770 476 h140"/><text x="694" y="508" class="small">If the prefix fails, the candidate stays locked.</text>
</svg>
